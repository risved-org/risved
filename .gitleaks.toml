# Gitleaks configuration for risved
# Extends the upstream default ruleset and adds project-specific allowlisting.
# Docs: https://github.com/gitleaks/gitleaks
[extend]
useDefault = true

[allowlist]
description = "Project allowlist"

# Template / fixture env files are intentionally committed and contain
# placeholder values only — never real secrets.
paths = [
  '''\.env\.example$''',
  '''\.env\.test$''',
]

# NOTE: the CI workflow scans only the NEW commits introduced by each push / PR
# (not full history), so the pre-existing secrets in this repo's history do not
# block CI. Those are removed separately via the history scrub
# (docs/runbooks/scrub-env-from-history.md). A one-off full-history audit can be
# run locally with:  gitleaks git . --config .gitleaks.toml --redact -v
