# Gitleaks configuration for risved
# Extends the upstream default ruleset and adds project-specific allowlisting.
# Docs: https://github.com/gitleaks/gitleaks
[extend]
useDefault = true

[allowlist]
description = "Project allowlist"

# Template / fixture env files are intentionally committed and contain
# placeholder values only — never real secrets.
paths = [
  '''\.env\.example$''',
  '''\.env\.test$''',
]

# TEMPORARY baseline: the secrets in commit 88ab3c6 (the committed .env and
# .risved-encryption.key) are known and being remediated via history scrub +
# secret rotation (see docs/runbooks/scrub-env-from-history.md). Allowlisting
# this single historical commit keeps CI from going permanently red on the
# known leak while still catching any NEW secret in any other commit.
# REMOVE this entry once the history scrub has completed.
commits = [
  "88ab3c609379204fbbe032ec3d678e7d39220b3f",
]
