name: secret-scan

# Enforcement layer (cannot be bypassed with --no-verify). Make this a required
# status check on the default branch so a PR can't merge if it leaks a secret.
#
# We run the gitleaks BINARY directly (MIT, free) rather than gitleaks-action@v2,
# which requires a paid GITLEAKS_LICENSE for organization-owned repos.
#
# The scan is INCREMENTAL: it inspects only the commits introduced by the push
# or pull request, not the whole history. That keeps the gate fast and means
# pre-existing secrets in history (being removed via the scrub runbook) don't
# permanently block CI, while any newly introduced secret fails the build.
on:
  push:
    branches: ['**']
  pull_request:

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    env:
      GITLEAKS_VERSION: 8.21.2
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so commit ranges can be resolved

      - name: Install gitleaks
        run: |
          curl -sSfL \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          sudo install -m 0755 gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Scan new commits for secrets
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE: ${{ github.event.pull_request.base.sha }}
          PUSH_BEFORE: ${{ github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          ZERO=0000000000000000000000000000000000000000
          if [ "$EVENT_NAME" = "pull_request" ]; then
            range="${PR_BASE}..${HEAD_SHA}"
          elif [ -n "${PUSH_BEFORE:-}" ] && [ "$PUSH_BEFORE" != "$ZERO" ] \
               && git cat-file -e "${PUSH_BEFORE}^{commit}" 2>/dev/null; then
            range="${PUSH_BEFORE}..${HEAD_SHA}"
          elif git rev-parse --verify -q "${HEAD_SHA}~1" >/dev/null; then
            range="${HEAD_SHA}~1..${HEAD_SHA}" # new branch: scan tip commit
          else
            range="${HEAD_SHA}" # root commit
          fi
          echo "Scanning commit range: ${range}"
          gitleaks git . \
            --log-opts="--no-merges ${range}" \
            --config .gitleaks.toml \
            --redact --verbose --exit-code 1
