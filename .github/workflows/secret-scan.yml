name: secret-scan

# Enforcement layer (cannot be bypassed with --no-verify). Make this a required
# status check on the default branch so a PR can't merge if it leaks a secret.
on:
  push:
    branches: ['**']
  pull_request:

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so pushed commits can be diffed
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml
