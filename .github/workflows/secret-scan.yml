name: secret-scan

# Enforcement layer (cannot be bypassed with --no-verify). Make this a required
# status check on the default branch so a PR can't merge if it leaks a secret.
#
# We run the gitleaks BINARY directly (MIT, free) rather than gitleaks-action@v2,
# which requires a paid GITLEAKS_LICENSE for organization-owned repos.
on:
  push:
    branches: ['**']
  pull_request:

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    env:
      GITLEAKS_VERSION: 8.21.2
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so all commits can be scanned

      - name: Install gitleaks
        run: |
          curl -sSfL \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          sudo install -m 0755 gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Scan git history for secrets
        run: gitleaks git . --config .gitleaks.toml --redact --verbose --exit-code 1
